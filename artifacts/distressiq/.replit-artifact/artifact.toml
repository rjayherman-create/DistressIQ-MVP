kind = "web"
previewPath = "/"
title = "DistressIQ"
version = "1.0.0"
id = "artifacts/distressiq"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21135

[services.development]
run = "pnpm --filter @workspace/distressiq run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/distressiq", "run", "build" ]
publicDir = "artifacts/distressiq/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21135"
BASE_PATH = "/"
