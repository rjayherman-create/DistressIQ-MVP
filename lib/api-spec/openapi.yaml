openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: stocks
    description: Distressed stock intelligence operations
  - name: Auth
    description: Browser and mobile authentication endpoints.
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /stocks:
    get:
      operationId: listStocks
      tags: [stocks]
      summary: List distressed stocks
      description: Returns all tracked distressed stocks with scoring data
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
          description: Filter by status
        - name: q
          in: query
          required: false
          schema:
            type: string
          description: Search query for ticker or company
      responses:
        "200":
          description: List of stocks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Stock"
  /stocks/{ticker}:
    get:
      operationId: getStock
      tags: [stocks]
      summary: Get stock detail
      parameters:
        - name: ticker
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Stock detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Stock"
        "404":
          description: Stock not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /watchlist:
    get:
      operationId: getWatchlist
      tags: [stocks]
      summary: Get watchlist tickers
      responses:
        "200":
          description: Watchlist tickers
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WatchlistResponse"
  /watchlist/{ticker}:
    post:
      operationId: addToWatchlist
      tags: [stocks]
      summary: Add ticker to watchlist
      parameters:
        - name: ticker
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Updated watchlist
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WatchlistResponse"
    delete:
      operationId: removeFromWatchlist
      tags: [stocks]
      summary: Remove ticker from watchlist
      parameters:
        - name: ticker
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Updated watchlist
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WatchlistResponse"
  /auth/user:
    get:
      tags: [Auth]
      operationId: getCurrentAuthUser
      summary: Get the currently authenticated user
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '200':
          description: Auth status resolved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUserEnvelope'
  /login:
    get:
      tags: [Auth]
      operationId: beginBrowserLogin
      summary: Start the browser OIDC login flow
      parameters:
        - name: returnTo
          in: query
          required: false
          schema:
            type: string
      responses:
        '302':
          description: Redirect to the OIDC authorization endpoint.
  /callback:
    get:
      tags: [Auth]
      operationId: handleBrowserLoginCallback
      summary: Complete the browser OIDC login flow
      parameters:
        - name: code
          in: query
          required: false
          schema:
            type: string
        - name: state
          in: query
          required: false
          schema:
            type: string
        - name: iss
          in: query
          required: false
          schema:
            type: string
            format: uri
      responses:
        '302':
          description: Redirect to the returnTo path on success.
  /logout:
    get:
      tags: [Auth]
      operationId: logoutBrowserSession
      summary: Clear the session and begin OIDC logout
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '302':
          description: Redirect to the OIDC provider logout URL.
  /mobile-auth/token-exchange:
    post:
      tags: [Auth]
      operationId: exchangeMobileAuthorizationCode
      summary: Exchange a mobile OIDC code for a session token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MobileTokenExchangeRequest'
      responses:
        '200':
          description: Session created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MobileTokenExchangeSuccess'
        '400':
          description: Missing or invalid required fields.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Token did not contain usable claims.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Token exchange failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /mobile-auth/logout:
    post:
      tags: [Auth]
      operationId: logoutMobileSession
      summary: Delete a mobile session token
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
      responses:
        '200':
          description: Logout processed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogoutSuccess'
  /alerts:
    get:
      operationId: listAlerts
      tags: [stocks]
      summary: List triggered alerts
      responses:
        "200":
          description: List of alerts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Alert"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    ChartPoint:
      type: object
      properties:
        d:
          type: string
        p:
          type: number
      required:
        - d
        - p
    Stock:
      type: object
      properties:
        ticker:
          type: string
        company:
          type: string
        price:
          type: number
        exchange:
          type: string
        industry:
          type: string
        daysUnderOne:
          type: integer
        daysToDeadline:
          type: integer
        bounceProbability:
          type: integer
        delistingRisk:
          type: integer
        complianceScore:
          type: integer
        financialScore:
          type: integer
        operatorScore:
          type: integer
        industryScore:
          type: integer
        patternScore:
          type: integer
        tradabilityScore:
          type: integer
        operatorNote:
          type: string
        financialNote:
          type: string
        tradeWindow:
          type: string
        entryZone:
          type: string
        targetZone:
          type: string
        stopZone:
          type: string
        status:
          type: string
        volume:
          type: string
        chart:
          type: array
          items:
            $ref: "#/components/schemas/ChartPoint"
      required:
        - ticker
        - company
        - price
        - exchange
        - industry
        - daysUnderOne
        - daysToDeadline
        - bounceProbability
        - delistingRisk
        - complianceScore
        - financialScore
        - operatorScore
        - industryScore
        - patternScore
        - tradabilityScore
        - operatorNote
        - financialNote
        - tradeWindow
        - entryZone
        - targetZone
        - stopZone
        - status
        - volume
        - chart
    WatchlistResponse:
      type: object
      properties:
        tickers:
          type: array
          items:
            type: string
      required:
        - tickers
    Alert:
      type: object
      properties:
        id:
          type: string
        message:
          type: string
        ticker:
          type: string
        severity:
          type: string
          enum: [info, warning, critical]
        createdAt:
          type: string
      required:
        - id
        - message
        - ticker
        - severity
        - createdAt
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error
    AuthUser:
      type: object
      required: [id, email, firstName, lastName, profileImageUrl]
      properties:
        id:
          type: string
        email:
          type: [string, 'null']
          format: email
        firstName:
          type: [string, 'null']
        lastName:
          type: [string, 'null']
        profileImageUrl:
          type: [string, 'null']
    AuthUserEnvelope:
      type: object
      required: [user]
      properties:
        user:
          oneOf:
            - $ref: '#/components/schemas/AuthUser'
            - type: 'null'
    MobileTokenExchangeRequest:
      type: object
      required: [code, code_verifier, redirect_uri, state]
      properties:
        code:
          type: string
          minLength: 1
        code_verifier:
          type: string
          minLength: 1
        redirect_uri:
          type: string
          minLength: 1
          format: uri
        state:
          type: string
          minLength: 1
        nonce:
          type: string
          minLength: 1
    MobileTokenExchangeSuccess:
      type: object
      required: [token]
      properties:
        token:
          type: string
    LogoutSuccess:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
          const: true
    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: string
  parameters:
    AuthorizationSessionHeader:
      name: Authorization
      in: header
      required: false
      description: Opaque session token — `Bearer <sid>`.
      schema:
        type: string
    SessionCookie:
      name: sid
      in: cookie
      required: false
      description: Browser session cookie.
      schema:
        type: string
